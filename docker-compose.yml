version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: iptv_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-iptv_sync}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: iptv_backend
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-iptv_sync}
      - IPTV_BASE_URL=${IPTV_BASE_URL}
      - IPTV_USER=${IPTV_USER}
      - IPTV_PASS=${IPTV_PASS}
      - SCHEDULE_TIMEZONE=${SCHEDULE_TIMEZONE:-UTC}
      - MEDIA_PATH=/media/usb/Compartida_Kodi
      - ARCHIVE_PATH=/archive
      - MAX_CONCURRENT_DOWNLOADS=${MAX_CONCURRENT_DOWNLOADS:-3}
      - DOWNLOAD_STALL_TIMEOUT_SECONDS=${DOWNLOAD_STALL_TIMEOUT_SECONDS:-180}
      - DOWNLOAD_MAX_AUTO_RETRIES=${DOWNLOAD_MAX_AUTO_RETRIES:-6}
      - DOWNLOAD_RETRY_BASE_SECONDS=${DOWNLOAD_RETRY_BASE_SECONDS:-5}
      - DOWNLOAD_RETRY_MAX_SECONDS=${DOWNLOAD_RETRY_MAX_SECONDS:-120}
      - DOWNLOAD_CONNECT_TIMEOUT_SECONDS=${DOWNLOAD_CONNECT_TIMEOUT_SECONDS:-15}
      - DOWNLOAD_READ_TIMEOUT_SECONDS=${DOWNLOAD_READ_TIMEOUT_SECONDS:-45}
      - DOWNLOAD_PROGRESS_COMMIT_INTERVAL_SECONDS=${DOWNLOAD_PROGRESS_COMMIT_INTERVAL_SECONDS:-2}
    volumes:
      - ./backend:/app
      - ${USB_MOUNT_PATH:-/media/usb}:/media/usb
      - ${ARCHIVE_PATH:-/home/jvillacob/Archivos_IPTV}:/archive
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: iptv_frontend
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: ng serve --host 0.0.0.0 --poll 2000 --allowed-hosts iptv.jcvillacob.online

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: iptv_cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run
    volumes:
      - ./.cloudflared:/etc/cloudflared:ro
    depends_on:
      - frontend

# Global volumes section removed as we are using bind mounts for all persistent data
